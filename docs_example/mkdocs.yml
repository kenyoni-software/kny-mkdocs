site_name: Kenyoni MkDocs Example
site_url: https://kenyoni-software.github.io/kny-mkdocs
copyright: "&copy; Copyright 2024-present Kenyoni Software"

extra:
  generator: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kenyoni-software

markdown_extensions:
  - attr_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - kny_badge
  - kny_external_link_icon
  - kny_godot_ref
  - kny_common:
      admonition_idea: True
      mathjax: "latest"
      tablesort: "latest"
  - kny_source_ref:
      source_url: "https://github.com/kenyoni-software/kny-mkdocs/tree/main"

theme:
  name: material
